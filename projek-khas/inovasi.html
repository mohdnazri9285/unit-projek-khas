        {bil:36,wilayah:"Terengganu",rancangan:"Fpmsb Kerteh 5",inventor:"Tank Fertilizer (Ft)",projek:"Tank Fertilizer (Ft)",kategori:"Inovasi Operasi Ladang",obj:"Mengurangkan Pembaziran Baja - Mempercepat Proses Pengagihan Baja - Mengurangkan Risiko Tumpahan Baja - Meningkatkan Produktiviti Pembajaan"}
    ];

    // PAGINATION
    let currentPage = 1;
    const rowsPerPage = 15;
    let filteredData = [...window.inovasiData];

    function renderTable() {
        const start = (currentPage - 1) * rowsPerPage;
        const end = start + rowsPerPage;
        const pageData = filteredData.slice(start, end);

        const tbody = document.getElementById('tableBody');
        if (!tbody) return;

        tbody.innerHTML = pageData.map(item => `
            <tr onclick="showDetailPopup(${item.bil})">
                <td>${item.bil}</td>
                <td>${item.wilayah}</td>
                <td>${item.projek.substring(0,40)}${item.projek.length>40?'…':''}</td>
                <td>${item.kategori}</td>
            </tr>
        `).join('');

        const totalPages = Math.ceil(filteredData.length / rowsPerPage);
        document.getElementById('pageInfo').innerText = `Halaman ${currentPage} / ${totalPages || 1}`;
        document.getElementById('prevPage').disabled = currentPage === 1;
        document.getElementById('nextPage').disabled = currentPage === totalPages || totalPages === 0;

        document.getElementById('filterCount').innerText = `${filteredData.length} / ${window.inovasiData.length}`;
    }

    window.changePage = function(direction) {
        const totalPages = Math.ceil(filteredData.length / rowsPerPage);
        currentPage += direction;
        if (currentPage < 1) currentPage = 1;
        if (currentPage > totalPages) currentPage = totalPages;
        renderTable();
    };

    window.applyFilter = function() {
        const wilayah = document.getElementById('wilayahFilter').value;
        filteredData = wilayah === "SEMUA" ? [...window.inovasiData] : window.inovasiData.filter(i => i.wilayah === wilayah);
        currentPage = 1;
        renderTable();
    };

    window.resetFilter = function() {
        document.getElementById('wilayahFilter').value = "SEMUA";
        filteredData = [...window.inovasiData];
        currentPage = 1;
        renderTable();
    };

    window.showDetailPopup = function(bil) {
        const item = window.inovasiData.find(i => i.bil === bil);
        if (!item) return;

        const popup = document.getElementById('detailPopupContent');
        popup.innerHTML = `
            <button class="popup-close" onclick="closeDetailPopup()"><i class="fas fa-times-circle"></i></button>
            <h3><i class="fas fa-flask" style="color: var(--cyan);"></i> ${item.projek}</h3>

            <div class="detail-row">
                <div class="detail-label">Wilayah</div>
                <div class="detail-value">${item.wilayah}</div>
            </div>
            <div class="detail-row">
                <div class="detail-label">Bil</div>
                <div class="detail-value">${item.bil}</div>
            </div>
            <div class="detail-row">
                <div class="detail-label">Kategori</div>
                <div class="detail-value">${item.kategori}</div>
            </div>
            <div class="detail-row">
                <div class="detail-label">Inventor</div>
                <div class="detail-value">${item.inventor}</div>
            </div>
            <div class="detail-row">
                <div class="detail-label">Rancangan</div>
                <div class="detail-value">${item.rancangan}</div>
            </div>
            <div class="detail-row">
                <div class="detail-label">Objektif & Matlamat</div>
                <div class="detail-value">${item.obj}</div>
            </div>

            <div style="text-align: center; margin-top: 1.5rem;">
                <button class="btn-primary" onclick="closeDetailPopup()">Tutup</button>
            </div>
        `;

        document.getElementById('detailPopup').style.display = 'flex';
    };

    window.closeDetailPopup = function() {
        document.getElementById('detailPopup').style.display = 'none';
    };

    // Initial render
    renderTable();
</script>
</body>
