tbody.innerHTML = pageData.map(item => {
    return `
        <tr onclick="showDetailPopup(${item.bil})">
            <td>${item.bil}</td>
            <td>${item.wilayah}</td>
            <td>${item.projek}</td>
            <td>${item.kategori}</td>
            <td class="amount">RM ${item.amount.toLocaleString('ms-MY', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
            <td><span class="status-badge">⏳ Dalam Proses</span></td>
        </tr>
    `;
}).join('');
